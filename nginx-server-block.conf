# Complete Nginx Server Block Configuration
# Save this to: /etc/nginx/sites-available/mind-range

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name mind-range-game.jayanka.in;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    server_name mind-range-game.jayanka.in;
    
    # Set project root variable
    set $PROJECT_ROOT /var/www/html/mind-range-game;
    
    # Include Word Clash configuration
    include /var/www/html/mind-range-game/nginx.conf;
    
    # Max upload size
    client_max_body_size 100M;
}
